  setAssetsToAssetGroup(args: SetAssetsToAssetGroupInput!): Boolean!

  """Associates one or more asset groups with one or more assets."""
  addAssetGroupsToAssets(args: AddAssetGroupsToAssetsInput!): Boolean!

  """
  Replaces all asset groups for a specific asset with a new set of groups. Providing an empty list will remove all group associations from the asset.
  """
  setAssetGroupsToAsset(args: SetAssetGroupsToAssetInput!): Boolean!

  """Disassociates all asset groups from one or more specified assets."""
  removeAllAssetGroupsFromAssets(args: RemoveAllAssetGroupsFromAssetsInput!): Boolean!

