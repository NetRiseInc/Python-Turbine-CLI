"""
Org-level: which component identification methods are enabled.
Each field corresponds to one method (e.g. symbol index, hashes, signatures).
Used when fetching or filtering org component data by verification method.
"""
input IdentifiedComponentsPreviewInput {
  symbolIndexEnabled: Boolean
  kernelModuleEnabled: Boolean
  curatedHashEnabled: Boolean
  legacyHashEnabled: Boolean
  packageManifestEnabled: Boolean
  signatureEnabled: Boolean
  peMetaDataEnabled: Boolean
  libraryVersionEnabled: Boolean
  libraryNameEnabled: Boolean
  binaryFingerprintEnabled: Boolean
}

"""
Count and delta for a single component type in the org's identified components preview.
"""
type IdentificationMethodCount {
  """
  Number of components of this type matching the org's identification method filter.
  """
  beforeCount: Int

  """Change in quantity vs. previous state (e.g. after toggling a method)."""
  afterCount: Int
}

"""
Per-component-type counts for the org's identified components preview.
Each field gives quantity and difference for that component type under the
org's identification method filter.
"""
type IdentifiedComponentsPreview {
  application: IdentificationMethodCount!
  framework: IdentificationMethodCount!
  library: IdentificationMethodCount!
  container: IdentificationMethodCount!
  device: IdentificationMethodCount!
  kernel: IdentificationMethodCount!
  package: IdentificationMethodCount!
  kernelModule: IdentificationMethodCount!
  os: IdentificationMethodCount!
}

