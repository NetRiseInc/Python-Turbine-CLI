"""Possible component dependency scopes."""
enum ComponentScope {
  """
  Components bundled into the final product and required for the application to function in production.
  """
  RUNTIME

  """
  Components used only during local development or build processes, such as linters or compilers. Not included in the final production artifact.
  """
  DEVELOPMENT

  """
  Components necessary for building or compiling the application. These are required at build time but are typically not executed at runtime.
  """
  COMPILE

  """Components used for testing."""
  TEST

  """
  Components that are only included or activated under specific conditions.
  """
  CONDITIONAL

  """Other component scope. Use the name field for the exact string."""
  OTHER
}

"""Scope of the dependency component."""
type Scope {
  """The scope of the dependency component."""
  value: ComponentScope

  """Description of the scope, used for tooltips."""
  description: String

  """
  The actual scope(s) of the dependency component as a comma-separated string.
  """
  actualScope: String
}

enum IdentifiedViaCategory {
  """Category not specified."""
  UNSPECIFIED

  """
  Identifies components using binary-level analysis of compiled code structures.
  """
  BINARY_FINGERPRINT

  """Detects Linux kernel modules (.ko files) through file analysis."""
  KERNEL_MODULE

  """
  Matches file hashes against our maintained database of known component files across distributions.
  """
  CURATED_HASH

  """
  Matches file hashes against a historical reference list of known files.
  """
  LEGACY_HASH

  """
  Identifies shared libraries using both filename and version information extracted from the file.
  """
  LIBRARY_VERSION

  """
  Identifies shared libraries using only the filename without version matching.
  """
  LIBRARY_NAME

  """
  Extracts component information directly from package manager files (npm, pip, cargo, etc.).
  """
  PACKAGE_MANIFEST

  """
  Identifies Windows components using metadata embedded in Portable Executable files.
  """
  PE_METADATA

  """
  Identifies components using pattern matching against known software signatures.
  """
  SIGNATURE_DETECTION

  """
  Matches components based on exported function and symbol tables in binaries.
  """
  SYMBOL_INDEX

  """Identifies components that were manually remediated by the user."""
  USER_MODIFIED

  """Identifies the root component of the asset."""
  ROOT
}

