"""Detailed representation of a secret."""
type Secret {
  """Unique identifier of the secret."""
  id: ID!

  """
  Provider or detector type of the secret (e.g. 'github', 'aws_access_key').
  """
  type: SecretType
  subtype: String

  """Human-readable description of the secret."""
  description: String

  """File Path where the secret was found (e.g. file path, resource path)."""
  filePath: String

  """High-level classification of the secret."""
  category: SecretCategory!

  """Human-readable label for the category (UI-friendly)."""
  categoryLabel: String

  """Severity associated with this secret."""
  severity: SecretSeverity!

  """Sanitized / redacted representation of the secret value."""
  sanitizedSecret: String

  """Raw secret value. Only available when revealSecret is true."""
  rawSecret: String

  """Correlations to other assets or components that reference this secret."""
  correlations: [AssetCorrelation!] @deprecated(reason: "Use `listAssetCorrelations` for paginated correlations. This embedded list is deprecated as NetRise decouples pagination; `correlationsCount` remains on this type.")

  """Total number of correlations."""
  correlationsCount: Int!

  """Status of remediation for this secret."""
  remediationStatus: SecretRemediationStatus

  """The most recent vulnerability remediation for a given assetId"""
  currentRemediation: SecretRemediation
  isReachable: Boolean
}

type SecretRemediation {
  secretId: ID
  status: SecretRemediationStatus
  description: String
  author: String
  createdAt: String
}

"""Aggregate counters of secrets, e.g. by severity."""
type SecretsSummary {
  """Total number of secrets."""
  total: Int!

  """Number of secrets with HIGH severity."""
  high: Int!

  """Number of secrets with MEDIUM severity."""
  medium: Int!

  """Number of secrets with LOW severity."""
  low: Int!

  """Number of invalid secrets (e.g. false positives)."""
  invalid: Int!
}

"""Filter for secrets."""
input SecretsFilter {
  type: [SecretType]
  severity: [SecretSeverity]
  category: SecretCategory
  search: String
  status: [SecretRemediationStatus]

  """
  When true, only secrets marked as reachable (reachability v2).
  Pushed to gRPC for list queries; categories-summary rebuilds from filtered list.
  """
  isReachable: Boolean
}

"""Input for querying a single secret."""
input SecretInput {
  """Unique secret identifier."""
  id: ID!

  """If true, attempts to return the raw secret value."""
  revealSecret: Boolean = false
}

"""Input for listing secrets on an asset."""
input SecretsInput {
  """
  Asset identifier whose secrets are being listed.
  Maps to ListAssetSecretsRequest.asset_id.
  """
  assetId: ID!

  """Pagination configuration."""
  cursor: Cursor!

  """Optional structured filter for secrets."""
  filter: SecretsFilter

