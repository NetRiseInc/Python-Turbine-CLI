}

type Vulnerability {
  """Unique identifier for the vulnerability, e.g. cve-id"""
  id: ID!

  """
  Netrise Priority Score for individual vulnerability that normalizes CVSS, EPSS, and supporting exploit features on a 0-1 scale.
  """
  priorityScore: Float!

  """Overall severity"""
  severity: String!

  """Date the vulnerability was published"""
  createdDatetime: String!

  """Date the vulnerability was last updated"""
  updatedDatetime: String!

  """Date the vulnerability was processed in the NetRise platform"""
  processedDatetime: String!

  """Description of the vulnerability"""
  description: String

  """Problem types associated with the vulnerability"""
  problemTypes: [ProblemType!]

  """References to external resources associated with the vulnerability"""
  references: [VulnerabilityReference!]

  """Tags associated with the vulnerability, for filtering"""
  tags: [String!]

  """CVSS-3 impact for the vulnerability"""
  impact: Impact

  """CVSS-2 impact for the vulnerability"""
  impactV2: ImpactV2

  """CVSS-3.1 impact for the vulnerability"""
  impactV31: ImpactV31

  """CVSS-4 impact for the vulnerability"""
  impactV4: ImpactV4

  """Exploit availability for the vulnerability"""
  exploit: Exploit

  """The most recent vulnerability remediation for a given assetId"""
  currentRemediation: AssetVulnerabilityRemediation

  """
  The analysis status of the vulnerability as categorized by NVD (e.g., REJECTED, ANALYZED, AWAITING_ANALYSIS, MODIFIED, UNDERGOING_ANALYSIS, DEFERRED, RECEIVED).
  """
  nvdStatus: VulnerabilityNVDStatus
}

