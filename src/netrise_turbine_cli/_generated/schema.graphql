"""
Ranks the fidelity of the sources and methods used to identify this type.
"""
enum Fidelity {
  LOW
  MEDIUM
  HIGH
  CERTAIN
}

enum Confidence {
  """Confidence not specified"""
  UNSPECIFIED

  """Low confidence"""
  LOW

  """Medium confidence"""
  MEDIUM

  """High confidence"""
  HIGH
}

"""A coordinate identifying a location where a component was found."""
type Coordinate {
  """Method of component identification used to associate this coordinate"""
  method: String!

  """Digest hashes identifying the content at the coordinate"""
  digest: Digest!

  """Identifies the type of the coordinate."""
  type: CoordinateType!

  """Carries a marshalled form of the coordinate."""
  value: String!

  """Indicates a confidence level in the relationship."""
  fidelity: Fidelity!
}

"""Identifies the type of coordinate."""
enum CoordinateType {
  """A standard path type coordinate."""
  PATH
}

"""A package that is kept within a package management system."""
type Package {
  """Name of the package"""
  name: String!

  """Identifies the type of package, such as DPKG, NPM, etc."""
  type: String

  """The source language behind the component (presumed)"""
  language: [Language!]

  """License(s) of the package (raw)"""
  license: String

  """Version identified as primary; the version displayed to users."""
  version: StringVersion

  """
  The raw version of the package, used for more advanced parsing and relative dependency relationships.
  """
  rawVersion: StringVersion

  """Various reference links for the component."""
  referenceLinks: [ReferenceLink!]

  """A short summary of the description of the package."""
  summary: String

  """Other names that the package provides."""
  provides: [PackageDependency!]

  """
  Files that are reported to be associated with the package.  Some package managers, like DPKG and NPM provide this info.
  """
  associatedFiles: [Coordinate!]

  """
  A list of dependencies reported by the package manager; other packages that this package depends on.
  """
  dependencies: [PackageDependency!]

  """The contacts who authored the package."""
  authors: [Email!]

  """The contacts who maintain the package."""
  maintainers: [Email!]
}

