}

"""A related, neighbor component with its edge properties."""
type ComponentNeighbor {
  component: Component!

  """Derived properties about the Component neighbor by it's relationships."""
  badges: [ComponentBadge!]

  """
  Component neighbor is derived from a concrete, exact version (1.0.0) and not a relative version expression such as a package manifest constraint (>1.0.0).
  """
  isConcrete: Boolean!
}

"""
Badges indicate where a Component’s dependency was identified to facilitate further investigation.
"""
enum ComponentBadge {
  """
  Files associated with this component were found on the same disk. This acts as an indicator to confirm that the dependency is already resolved and is not something that happens at runtime.
  """
  FOUNDONDISK

  """
  Evidence of this component was found but no exact file matches were located. This means the component is likely embedded within another on the same disk.
  """
  EMBEDDED
}

type Dependencies {
  """
  An explicit dependency of the package, application, or library component.
  """
  direct: [ComponentNeighbor!]

  """
  A transitive dependency of the package, application, or library component.
  """
  indirect: [ComponentNeighbor!]

  """
  Components within the root component that depend on this dependency component.
