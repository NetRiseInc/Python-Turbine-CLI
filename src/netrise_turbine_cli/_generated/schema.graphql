  """Removes one or more assets from a specified asset group."""
  removeAssetsFromAssetGroup(args: RemoveAssetsFromAssetGroupInput!): Boolean!

  """
  Replaces all assets in an asset group with a new list. Providing an empty list will remove all assets from the group.
