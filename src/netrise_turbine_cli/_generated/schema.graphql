"""Semantic versioning"""
type SemanticVersion {
  """Major version tag"""
  major: String

  """Minor version tag"""
  minor: String

  """Build version tag"""
  build: String

  """Release version tag"""
  release: String
}

"""Calendar versioning"""
type CalendarVersion {
  """Major version tag"""
  major: Int

  """Minor version tag"""
  minor: Int

  """Micro version tag"""
  micro: Int

  """Version Modifier"""
  modifier: String
}

"""Version identifier"""
type StringVersion {
  """Version Id"""
  id: String

  """Alternative version identifiers"""
  alternatives: [String!]

  """
  Version is derived from a concrete, exact version (1.0.0) and not a relative version expression such as a package manifest constraint (>1.0.0).
  """
  isConcrete: Boolean!
}

"""Generic Array Version"""
type ArrayVersion {
  """Version Id"""
  id: String!

  """Version Components"""
  components: [String!]!
}

"""Different types of versioning schemas"""
union Version = SemanticVersion | CalendarVersion | StringVersion | ArrayVersion