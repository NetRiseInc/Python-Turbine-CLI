  Applies a remediation status to a single vulnerability on a specific asset.
  """
  remediateAssetVulnerability(args: CreateAssetVulnerabilityRemediationInput!): DetectedVulnerability!

  """
  Applies a remediation status to multiple vulnerabilities on a specific asset in a single operation.
